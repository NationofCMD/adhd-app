<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>ADHD Capture</title>
    <style>
        :root {
            --extreme: #ff4d4f; --high: #fa8c16; --medium: #fadb14; --casual: #52c41a;
            --bg: #1e1e1e; --surface: #2d2d2d; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .header {
            background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #444; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 1.2rem; }
        .header button { background: none; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .input-area { display: flex; gap: 10px; margin-bottom: 15px; }
        textarea {
            flex: 1; background: var(--bg); color: var(--text); border: 1px solid #444;
            border-radius: 8px; padding: 10px; font-size: 1rem; resize: none; height: 100px;
        }
        .mic-btn {
            background: var(--bg); border: 2px solid #444; color: var(--text); border-radius: 8px;
            width: 60px; font-size: 1.5rem; cursor: pointer;
        }
        .mic-btn.recording { border-color: var(--extreme); color: var(--extreme); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .priority-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .p-btn {
            padding: 12px; border: 2px solid transparent; border-radius: 8px; background: var(--bg);
            color: var(--text); font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem;
        }
        .p-btn.active[data-p="Extreme"] { border-color: var(--extreme); color: var(--extreme); background: rgba(255, 77, 79, 0.1); }
        .p-btn.active[data-p="High"] { border-color: var(--high); color: var(--high); background: rgba(250, 140, 22, 0.1); }
        .p-btn.active[data-p="Medium"] { border-color: var(--medium); color: var(--medium); background: rgba(250, 219, 20, 0.1); }
        .p-btn.active[data-p="Casual"] { border-color: var(--casual); color: var(--casual); background: rgba(82, 196, 26, 0.1); }
        .save-btn {
            width: 100%; padding: 18px; background: #007bff; color: white; border: none;
            border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px;
        }
        .save-btn:disabled { opacity: 0.6; cursor: default; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .filters button { background: transparent; border: none; color: #888; cursor: pointer; font-weight: bold; margin-right: 10px; font-size: 1.1rem; }
        .filters button.active { color: var(--text); }
        .toggle-container { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007bff; }
        input:checked + .slider:before { transform: translateX(20px); }
        .sync-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.8rem; color: #888; }
        .sync-bar button { background: transparent; border: 1px solid #555; color: #aaa; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .sync-bar button:disabled { opacity: 0.4; cursor: default; }
        .notes-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .note-card { padding: 15px; border-radius: 8px; background: var(--bg); border-left: 5px solid #444; position: relative; }
        .note-card.Extreme { border-left-color: var(--extreme); }
        .note-card.High { border-left-color: var(--high); }
        .note-card.Medium { border-left-color: var(--medium); }
        .note-card.Casual { border-left-color: var(--casual); }
        .note-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; align-items: center; }
        .badge { font-weight: bold; text-transform: uppercase; }
        .badge.Extreme { color: var(--extreme); } .badge.High { color: var(--high); }
        .badge.Medium { color: var(--medium); } .badge.Casual { color: var(--casual); }
        .meta { display: flex; align-items: center; gap: 8px; }
        .timestamp { color: #888; }
        .sync-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .sync-tag.ok { color: var(--casual); border: 1px solid var(--casual); }
        .sync-tag.pending { color: var(--high); border: 1px solid var(--high); }
        .note-text { white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { background: var(--surface); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; }
        .modal-input {
            width: 100%; padding: 10px; margin: 8px 0 15px 0; background: var(--bg); border: 1px solid #444;
            color: white; border-radius: 5px; font-family: monospace; font-size: 0.85rem;
        }
        .close-modal { float: right; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            padding: 15px 20px; border-radius: 8px; color: white; font-weight: bold;
            opacity: 0; transition: 0.3s; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;
            font-size: 0.9rem; max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.Extreme { background: var(--extreme); } .toast.High { background: var(--high); }
        .toast.Medium { background: #e6b800; color: black; } .toast.Casual { background: var(--casual); color: black; }
        .toast.Error { background: #333; border: 1px solid var(--extreme); color: #ff4d4f; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Capture</h1>
        <button onclick="openSettings()">⚙️ Notion</button>
    </div>
    <div class="main-content">
        <div class="input-area">
            <textarea id="noteInput" placeholder="Type or speak your thought..."></textarea>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        </div>
        <div class="priority-selector">
            <button class="p-btn" data-p="Extreme" onclick="setPriority(this)">🔴 Extreme</button>
            <button class="p-btn active" data-p="High" onclick="setPriority(this)">🟠 High</button>
            <button class="p-btn" data-p="Medium" onclick="setPriority(this)">🟡 Medium</button>
            <button class="p-btn" data-p="Casual" onclick="setPriority(this)">🟢 Casual</button>
        </div>
        <button class="save-btn" id="saveBtn" onclick="logToNotion()">
            LOG TO NOTION
        </button>
        <div class="sync-bar">
            <span id="syncStatus">All notes saved locally.</span>
            <button id="retryBtn" onclick="retryUnsynced(false)">↻ Retry sync</button>
        </div>
        <div class="controls">
            <div class="filters">
                <button class="active" onclick="filterNotes('All', this)">All</button>
                <button onclick="filterNotes('Extreme', this)">🔴</button>
                <button onclick="filterNotes('High', this)">🟠</button>
                <button onclick="filterNotes('Medium', this)">🟡</button>
                <button onclick="filterNotes('Casual', this)">🟢</button>
            </div>
            <div class="toggle-container">
                Alerts
                <label class="switch"><input type="checkbox" id="alertToggle" checked><span class="slider"></span></label>
            </div>
        </div>
        <div class="notes-list" id="notesList">
            <p style="text-align:center;color:#666;">Your recent captures will appear here.</p>
        </div>
    </div>
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeSettings()">&times;</button>
            <h2>Notion Settings</h2>
            <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">Paste the URL of the Cloudflare Worker you deployed (see SETUP.md).</p>
            <label style="font-size:0.9rem; color:#aaa;">Worker URL</label>
            <input type="url" class="modal-input" id="inputWorkerUrl" placeholder="https://adhd-capture.yourname.workers.dev">
            <label style="font-size:0.9rem; color:#aaa;">App Secret (optional)</label>
            <input type="text" class="modal-input" id="inputAppSecret" placeholder="Only if you set APP_SECRET on the Worker">
            <button onclick="saveSettings()" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Save</button>
            <button onclick="testConnection()" style="width:100%; padding:10px; margin-top:8px; background:transparent; color:#aaa; border:1px solid #555; border-radius:5px; cursor:pointer;">Test connection</button>
        </div>
    </div>
    <div class="toast" id="alertToast"></div>

    <script>
        let currentPriority = 'High';
        let currentFilter = 'All';
        let isRecording = false;
        let recognition;
        let workerUrl = localStorage.getItem('notion_worker_url') || '';
        let appSecret = localStorage.getItem('notion_app_secret') || '';
        let localNotes = JSON.parse(localStorage.getItem('adhd_notes_cache')) || [];

        window.onload = () => {
            workerUrl = normalizeUrl(workerUrl); // clean up any old http:// value
            localStorage.setItem('notion_worker_url', workerUrl);
            document.getElementById('inputWorkerUrl').value = workerUrl;
            document.getElementById('inputAppSecret').value = appSecret;
            if (!workerUrl) { openSettings(); }
            renderNotes();
            updateSyncStatus();
            if (workerUrl) retryUnsynced(true); // quietly flush anything left over
        };

        function persist() { localStorage.setItem('adhd_notes_cache', JSON.stringify(localNotes)); }

        // Force https + strip trailing slash so we never trigger a redirect
        // (a redirect would turn our POST into a GET → 405).
        function normalizeUrl(u) {
            u = (u || '').trim().replace(/\/+$/, '');
            if (/^http:\/\//i.test(u)) u = u.replace(/^http:\/\//i, 'https://');
            else if (u && !/^https:\/\//i.test(u)) u = 'https://' + u;
            return u;
        }

        function saveSettings() {
            workerUrl = normalizeUrl(document.getElementById('inputWorkerUrl').value);
            appSecret = document.getElementById('inputAppSecret').value.trim();
            document.getElementById('inputWorkerUrl').value = workerUrl;
            localStorage.setItem('notion_worker_url', workerUrl);
            localStorage.setItem('notion_app_secret', appSecret);
            closeSettings();
            showToast('Settings saved', 'Casual');
            updateSyncStatus();
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        function buildHeaders() {
            const h = { 'Content-Type': 'application/json' };
            if (appSecret) h['X-App-Secret'] = appSecret;
            return h;
        }

        // Send one cached note to Notion via the Worker. Returns true on success.
        async function syncNote(note) {
            try {
                const res = await fetch(workerUrl, {
                    method: 'POST',
                    headers: buildHeaders(),
                    redirect: 'error',
                    body: JSON.stringify({ text: note.text, priority: note.priority, timestamp: note.timestamp })
                });
                let data = {};
                try { data = await res.json(); } catch (_) {}
                if (!res.ok) {
                    const msg = data.error || ('Notion error (' + res.status + ')');
                    showToast('⚠️ ' + msg + ' — kept locally', 'Error');
                    console.error('Notion sync failed:', res.status, data);
                    return false;
                }
                note.synced = true;
                persist(); renderNotes(); updateSyncStatus();
                return true;
            } catch (e) {
                showToast('⚠️ Network error — saved locally, will retry', 'Error');
                console.error('Sync network error:', e);
                return false;
            }
        }

        async function logToNotion() {
            const text = document.getElementById('noteInput').value.trim();
            if (!text) return;
            if (!workerUrl) { showToast('Set your Worker URL first (⚙️)', 'Error'); openSettings(); return; }

            // Save locally FIRST so a note is never lost, even if the network fails.
            const note = { id: Date.now(), text: text, priority: currentPriority, timestamp: new Date().toLocaleString(), synced: false };
            localNotes.unshift(note);
            persist(); renderNotes(); updateSyncStatus();
            document.getElementById('noteInput').value = '';

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = 'Logging…';
            const ok = await syncNote(note);
            btn.disabled = false; btn.textContent = 'LOG TO NOTION';
            if (ok) { triggerAlert(note.priority); }
        }

        async function retryUnsynced(silent) {
            const pending = localNotes.filter(n => !n.synced);
            if (pending.length === 0) { if (!silent) showToast('Everything is synced ✓', 'Casual'); return; }
            if (!workerUrl) { if (!silent) { showToast('Set your Worker URL first (⚙️)', 'Error'); openSettings(); } return; }
            const btn = document.getElementById('retryBtn');
            btn.disabled = true;
            let synced = 0;
            for (const note of pending) { if (await syncNote(note)) synced++; }
            btn.disabled = false;
            if (!silent) showToast('Synced ' + synced + '/' + pending.length, synced === pending.length ? 'Casual' : 'Error');
        }

        async function testConnection() {
            const url = normalizeUrl(document.getElementById('inputWorkerUrl').value);
            const secret = document.getElementById('inputAppSecret').value.trim();
            if (!url) { showToast('Enter a Worker URL first', 'Error'); return; }
            document.getElementById('inputWorkerUrl').value = url;
            try {
                const h = { 'Content-Type': 'application/json' };
                if (secret) h['X-App-Secret'] = secret;
                const res = await fetch(url, { method: 'POST', headers: h, redirect: 'error',
                    body: JSON.stringify({ text: '✅ Test note from ADHD Capture', priority: currentPriority, timestamp: new Date().toLocaleString() }) });
                let data = {};
                try { data = await res.json(); } catch (_) {}
                if (res.ok) showToast('Connected! Check your Notion database.', 'Casual');
                else showToast('⚠️ ' + (data.error || ('Error ' + res.status)), 'Error');
            } catch (e) {
                showToast('⚠️ Could not reach the Worker (check the URL).', 'Error');
                console.error(e);
            }
        }

        function updateSyncStatus() {
            const pending = localNotes.filter(n => !n.synced).length;
            const el = document.getElementById('syncStatus');
            el.textContent = pending === 0 ? 'All notes synced to Notion ✓' : (pending + ' note' + (pending === 1 ? '' : 's') + ' waiting to sync');
            el.style.color = pending === 0 ? '#52c41a' : '#fa8c16';
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) transcript += event.results[i][0].transcript;
                document.getElementById('noteInput').value = transcript;
            };
            recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); };
        }

        function toggleMic() {
            if (!recognition) { alert("Voice not supported in this browser."); return; }
            if (isRecording) { recognition.stop(); }
            else { recognition.start(); isRecording = true; document.getElementById('micBtn').classList.add('recording'); }
        }

        function setPriority(btn) {
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentPriority = btn.getAttribute('data-p');
        }

        function filterNotes(priority, btn) {
            currentFilter = priority;
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active'); renderNotes();
        }

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function renderNotes() {
            const list = document.getElementById('notesList'); list.innerHTML = '';
            const filtered = currentFilter === 'All' ? localNotes : localNotes.filter(n => n.priority === currentFilter);
            if (filtered.length === 0) { list.innerHTML = '<p style="text-align:center;color:#666;">No notes here. You are all clear!</p>'; return; }
            filtered.forEach(note => {
                const div = document.createElement('div'); div.className = `note-card ${note.priority}`;
                const tag = note.synced
                    ? '<span class="sync-tag ok">✓ Notion</span>'
                    : '<span class="sync-tag pending">⏳ pending</span>';
                div.innerHTML = `<div class="note-header"><span class="badge ${note.priority}">${note.priority}</span><span class="meta">${tag}<span class="timestamp">${note.timestamp}</span></span></div><div class="note-text">${escapeHtml(note.text)}</div>`;
                list.appendChild(div);
            });
        }

        function triggerAlert(priority) {
            if (!document.getElementById('alertToggle').checked) return;
            const toast = document.getElementById('alertToast'); toast.className = `toast ${priority}`;
            toast.innerText = `✅ ${priority} note saved to Notion!`; void toast.offsetWidth; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showToast(msg, type) {
            const toast = document.getElementById('alertToast'); toast.className = `toast ${type}`;
            toast.innerText = msg; void toast.offsetWidth; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
