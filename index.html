<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>ADHD Capture</title>
    <style>
        :root {
            --extreme: #ff4d4f; --high: #fa8c16; --medium: #fadb14; --casual: #52c41a;
            --bg: #1e1e1e; --surface: #2d2d2d; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .header {
            background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #444; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 1.2rem; }
        .header button { background: none; border: 1px solid #555; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .input-area { display: flex; gap: 10px; margin-bottom: 15px; }
        textarea {
            flex: 1; background: var(--bg); color: var(--text); border: 1px solid #444;
            border-radius: 8px; padding: 10px; font-size: 1rem; resize: none; height: 100px;
        }
        .mic-btn {
            background: var(--bg); border: 2px solid #444; color: var(--text); border-radius: 8px;
            width: 60px; font-size: 1.5rem; cursor: pointer;
        }
        .mic-btn.recording { border-color: var(--extreme); color: var(--extreme); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .priority-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .p-btn {
            padding: 12px; border: 2px solid transparent; border-radius: 8px; background: var(--bg);
            color: var(--text); font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem;
        }
        .p-btn.active[data-p="Extreme"] { border-color: var(--extreme); color: var(--extreme); background: rgba(255, 77, 79, 0.1); }
        .p-btn.active[data-p="High"] { border-color: var(--high); color: var(--high); background: rgba(250, 140, 22, 0.1); }
        .p-btn.active[data-p="Medium"] { border-color: var(--medium); color: var(--medium); background: rgba(250, 219, 20, 0.1); }
        .p-btn.active[data-p="Casual"] { border-color: var(--casual); color: var(--casual); background: rgba(82, 196, 26, 0.1); }
        .save-btn {
            width: 100%; padding: 18px; background: #007bff; color: white; border: none;
            border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .save-btn:disabled { background: #555; cursor: not-allowed; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .filters button { background: transparent; border: none; color: #888; cursor: pointer; font-weight: bold; margin-right: 10px; font-size: 1.1rem; }
        .filters button.active { color: var(--text); }
        .toggle-container { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007bff; }
        input:checked + .slider:before { transform: translateX(20px); }
        .notes-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .note-card { padding: 15px; border-radius: 8px; background: var(--bg); border-left: 5px solid #444; position: relative; }
        .note-card.Extreme { border-left-color: var(--extreme); }
        .note-card.High { border-left-color: var(--high); }
        .note-card.Medium { border-left-color: var(--medium); }
        .note-card.Casual { border-left-color: var(--casual); }
        .note-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; }
        .badge { font-weight: bold; text-transform: uppercase; }
        .badge.Extreme { color: var(--extreme); } .badge.High { color: var(--high); }
        .badge.Medium { color: var(--medium); } .badge.Casual { color: var(--casual); }
        .timestamp { color: #888; }
        .note-text { white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { background: var(--surface); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; }
        .modal-input {
            width: 100%; padding: 10px; margin: 8px 0 15px 0; background: var(--bg); border: 1px solid #444;
            color: white; border-radius: 5px; font-family: monospace;
        }
        .close-modal { float: right; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            padding: 15px 20px; border-radius: 8px; color: white; font-weight: bold;
            opacity: 0; transition: 0.3s; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.Extreme { background: var(--extreme); } .toast.High { background: var(--high); }
        .toast.Medium { background: #e6b800; color: black; } .toast.Casual { background: var(--casual); color: black; }
        .toast.Error { background: #333; border: 1px solid var(--extreme); }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Capture</h1>
        <button onclick="openSettings()">⚙️ Settings</button>
    </div>
    <div class="main-content">
        <div class="input-area">
            <textarea id="noteInput" placeholder="Type or speak your thought..."></textarea>
            <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        </div>
        <div class="priority-selector">
            <button class="p-btn" data-p="Extreme" onclick="setPriority(this)">🔴 Extreme</button>
            <button class="p-btn active" data-p="High" onclick="setPriority(this)">🟠 High</button>
            <button class="p-btn" data-p="Medium" onclick="setPriority(this)">🟡 Medium</button>
            <button class="p-btn" data-p="Casual" onclick="setPriority(this)">🟢 Casual</button>
        </div>
        <button class="save-btn" id="saveBtn" onclick="saveNote()">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">SAVE TO NOTION</span>
        </button>
        <div class="controls">
            <div class="filters">
                <button class="active" onclick="filterNotes('All', this)">All</button>
                <button onclick="filterNotes('Extreme', this)">🔴</button>
                <button onclick="filterNotes('High', this)">🟠</button>
                <button onclick="filterNotes('Medium', this)">🟡</button>
                <button onclick="filterNotes('Casual', this)">🟢</button>
            </div>
            <div class="toggle-container">
                Alerts
                <label class="switch"><input type="checkbox" id="alertToggle" checked><span class="slider"></span></label>
            </div>
        </div>
        <div class="notes-list" id="notesList">
            <p style="text-align:center;color:#666;">Loading notes from Notion...</p>
        </div>
    </div>
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeSettings()">&times;</button>
            <h2>Notion Setup</h2>
            <label style="font-size:0.9rem; color:#aaa;">Notion API Token (Secret)</label>
            <input type="password" class="modal-input" id="inputToken" placeholder="ntn_...">
            <label style="font-size:0.9rem; color:#aaa;">Notion Database ID</label>
            <input type="text" class="modal-input" id="inputDbId" placeholder="32 character string...">
            <button onclick="saveSettings()" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Save & Connect</button>
        </div>
    </div>
    <div class="toast" id="alertToast"></div>

    <script>
        let currentPriority = 'High';
        let currentFilter = 'All';
        let isRecording = false;
        let recognition;
        let notionToken = localStorage.getItem('notion_token') || '';
        let notionDbId = localStorage.getItem('notion_db_id') || '';
        let localNotes = JSON.parse(localStorage.getItem('adhd_notes_cache')) || [];

        window.onload = () => {
            if (!notionToken || !notionDbId) { openSettings(); } else { fetchNotionNotes(); }
            renderNotes();
        };

        async function saveSettings() {
            notionToken = document.getElementById('inputToken').value.trim();
            notionDbId = document.getElementById('inputDbId').value.trim();
            localStorage.setItem('notion_token', notionToken);
            localStorage.setItem('notion_db_id', notionDbId);
            closeSettings();
            fetchNotionNotes();
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        async function fetchNotionNotes() {
            if(!notionToken || !notionDbId) return;
            try {
                const res = await fetch(`https://api.notion.com/v1/databases/${notionDbId}/query`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${notionToken}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sorts: [{ property: 'Created At', direction: 'descending' }] })
                });
                const data = await res.json();
                if(data.results) {
                    localNotes = data.results.map(page => ({
                        id: page.id,
                        text: page.properties.Name.title[0]?.plain_text || "Empty Note",
                        priority: page.properties.Priority.select?.name || 'Casual',
                        timestamp: new Date(page.properties['Created At'].date?.start || page.created_time).toLocaleString()
                    })).filter(n => n.text !== "Empty Note");
                    localStorage.setItem('adhd_notes_cache', JSON.stringify(localNotes));
                    renderNotes();
                }
            } catch (e) { console.error("Fetch error", e); }
        }

        async function saveNote() {
            const text = document.getElementById('noteInput').value.trim();
            if (!text) return;
            if (!notionToken || !notionDbId) { showToast("Please configure Settings first", "Error"); return; }
            const btn = document.getElementById('saveBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            btn.disabled = true; spinner.style.display = 'block'; btnText.innerText = 'SAVING...';
            const timestamp = new Date().toISOString();
            try {
                const res = await fetch('https://api.notion.com/v1/pages', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${notionToken}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        parent: { database_id: notionDbId },
                        properties: {
                            'Name': { title: [{ text: { content: text } }] },
                            'Priority': { select: { name: currentPriority } },
                            'Created At': { date: { start: timestamp } }
                        }
                    })
                });
                if (!res.ok) throw new Error('Notion API Error');
                document.getElementById('noteInput').value = '';
                triggerAlert(currentPriority);
                localNotes.unshift({ id: Date.now(), text: text, priority: currentPriority, timestamp: new Date(timestamp).toLocaleString() });
                renderNotes();
                    } catch (error) {
            let errorMsg = "Network error";
            try {
                const errorData = await error.json();
                errorMsg = errorData.message || "Unknown API Error";
            } catch(e) {
                errorMsg = error.message || "Failed to connect";
            }
            showToast("Error: " + errorMsg, "Error");
        } finally { btn.disabled = false; spinner.style.display = 'none'; btnText.innerText = 'SAVE TO NOTION'; }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) transcript += event.results[i][0].transcript;
                document.getElementById('noteInput').value = transcript;
            };
            recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); };
        }

        function toggleMic() {
            if (!recognition) { alert("Voice not supported in this browser."); return; }
            if (isRecording) { recognition.stop(); } 
            else { recognition.start(); isRecording = true; document.getElementById('micBtn').classList.add('recording'); }
        }

        function setPriority(btn) {
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentPriority = btn.getAttribute('data-p');
        }

        function filterNotes(priority, btn) {
            currentFilter = priority;
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active'); renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notesList'); list.innerHTML = '';
            const filtered = currentFilter === 'All' ? localNotes : localNotes.filter(n => n.priority === currentFilter);
            if (filtered.length === 0) { list.innerHTML = '<p style="text-align:center;color:#666;">No notes here. You are all clear!</p>'; return; }
            filtered.forEach(note => {
                const div = document.createElement('div'); div.className = `note-card ${note.priority}`;
                div.innerHTML = `<div class="note-header"><span class="badge ${note.priority}">${note.priority}</span><span class="timestamp">${note.timestamp}</span></div><div class="note-text">${note.text}</div>`;
                list.appendChild(div);
            });
        }

        function triggerAlert(priority) {
            if (!document.getElementById('alertToggle').checked) return;
            const toast = document.getElementById('alertToast'); toast.className = `toast ${priority}`;
            toast.innerText = `🚨 ${priority} Priority Saved!`; void toast.offsetWidth; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function showToast(msg, type) {
            const toast = document.getElementById('alertToast'); toast.className = `toast ${type}`;
            toast.innerText = msg; void toast.offsetWidth; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
